<header class="navbar-container">
  <div class="navbar-content">
    
    <!-- Logo & Brand -->
    <div class="brand">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="brand-text">ATS</span>
    </div>

    <!-- Right Side Actions -->
    <div class="actions">
      
      <!-- Notifications -->
      <div class="action-item relative">
        <button class="icon-btn" (click)="toggleNotifications()" aria-label="Notifications">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
        </button>
        
        <!-- Notifications Dropdown -->
        <div class="dropdown-menu" *ngIf="notificationsOpen">
          <div class="dropdown-header">Notifications</div>
          <div class="dropdown-content">
            <div class="notification-item" *ngFor="let notif of notifications" [class.unread]="!notif.isRead">
              <div class="notif-icon" [ngClass]="notif.type === 'ALERT' ? 'danger' : 'primary'">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5c-1.1 0-2 .9-2 2v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
              </div>
              <div class="notif-text">
                <p>{{ notif.title }}</p>
                <span>{{ notif.createdAt | date:'short' }}</span>
              </div>
            </div>
            <div class="notification-item" *ngIf="notifications.length === 0">
              <div class="notif-text" style="text-align: center; width: 100%">
                <p style="color: rgba(255,255,255,0.5)">Aucune notification</p>
              </div>
            </div>
          </div>
          <div class="dropdown-footer">
            <a routerLink="/notifications" (click)="toggleNotifications()">Voir tout</a>
          </div>
        </div>
      </div>

      <!-- User Profile -->
      <div class="action-item relative">
        <button class="profile-btn" (click)="toggleUserMenu()">
          <div class="avatar">
            <img [src]="'https://ui-avatars.com/api/?name=' + username + '&background=0061ff&color=fff'" alt="User">
          </div>
          <div class="user-info">
            <span class="user-name">{{ username }}</span>
            <span class="user-role">{{ userRole }}</span>
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>

        <!-- Profile Dropdown -->
        <div class="dropdown-menu profile-dropdown" *ngIf="userMenuOpen">
          <button (click)="logout()" class="dropdown-item text-danger">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Déconnexion
          </button>
        </div>
      </div>
      
    </div>
  </div>
</header>
