<div class="login-container">
  <div class="login-form-wrapper">
    <h2 class="title">Connexion</h2>
    <p class="subtitle">Identifiez-vous avec votre compte professionnel</p>
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Identifiant ou email</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          required
          autocomplete="username"
          placeholder="Votre identifiant"
          [disabled]="loading"
        />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
          placeholder="Votre mot de passe"
          [disabled]="loading"
        />
      </div>
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
      <button type="submit" class="btn-submit" [class.disabled-btn]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>
    <p class="subtitle" style="margin-top:1rem">
      Pas de compte ? <a routerLink="/register" style="color:#60efff">Créer un compte</a>
    </p>
  </div>
</div>
