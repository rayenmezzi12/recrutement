server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: logique-metier
          uri: lb://logique-metier-service
          predicates:
            - Path=/api/candidates/**,/api/recruitment/**,/api/interviews/**,/api/offers/**,/api/reports/**,/api/dashboard/**,/api/messages/**,/api/notifications/**,/api/history/**,/api/documents/**,/api/dept-reviews/**,/uploads/**
        - id: chatbot-service
          uri: lb://chatbot-service
          predicates:
            - Path=/api/chatbot/**
  messages:
    encoding: UTF-8

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:9a4f2c8d3b7a1e5f8g6h4j2k0l9m8n7o6p5q4r3s2t1u0v9w8x7y6z5a4b3c2d1e}
